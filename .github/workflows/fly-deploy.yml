name: Deploy (Fly.io)

# Deploys from GitHub's runners (which have working networking), so no local
# fly CLI is needed. Bootstraps the app + volume on first run, then deploys.
#
# Required GitHub repo secrets (Settings -> Secrets and variables -> Actions):
#   FLY_API_TOKEN        - from https://fly.io/user/personal_access_tokens
#   TELEGRAM_BOT_TOKEN   - BotFather token
#   ANTHROPIC_API_KEY
#   OPENAI_API_KEY

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: fly-deploy
      cancel-in-progress: false
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      FLY_APP: made-with-care        # must match `app` in fly.toml
      FLY_REGION: fra
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Ensure app exists
        run: flyctl apps create "$FLY_APP" --org personal || true

      - name: Ensure volume exists (single 1GB disk for sqlite)
        run: |
          if ! flyctl volumes list -a "$FLY_APP" 2>/dev/null | grep -q ph_data; then
            flyctl volumes create ph_data -a "$FLY_APP" --region "$FLY_REGION" --size 1 --yes
          fi

      - name: Stage app secrets
        run: |
          flyctl secrets set -a "$FLY_APP" --stage \
            TELEGRAM_BOT_TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}" \
            ANTHROPIC_API_KEY="${{ secrets.ANTHROPIC_API_KEY }}" \
            OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}"

      - name: Deploy (single machine, built on Fly remote builders)
        run: flyctl deploy --remote-only --ha=false -a "$FLY_APP"
