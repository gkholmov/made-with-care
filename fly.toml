# Fly.io config for the Parent Helper bot + Mini App (one machine, both processes).
# `fly launch --no-deploy --copy-config --name <name>` will set `app` below.
# Pick a region near your users (fra = Frankfurt, iad = US-East, etc.).
app = "made-with-care"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  WEBAPP_PORT = "8080"            # must equal http_service.internal_port
  WEBAPP_DIST = "webapp/dist"
  LLM_PROVIDER = "anthropic"
  LLM_MODEL = "claude-opus-4-8"
  STT_PROVIDER = "openai"
  TTS_PROVIDER = "openai"
  TTS_VOICE = "alloy"
  TELEGRAM_BOT_USERNAME = "made_with_care_bot"
  DATABASE_URL = "sqlite:////data/parent_helper.db"   # 4 slashes = absolute /data path
  LOG_LEVEL = "INFO"
  # After `fly launch` prints your app name, set this to the public URL and redeploy:
  # WEBAPP_URL = "https://made-with-care.fly.dev"
  #
  # Do NOT set PUBLIC_BASE_URL  -> its presence switches the bot to webhook mode.
  # Do NOT set WEBAPP_INSECURE_DEV -> its presence disables real Telegram initData auth.
  #
  # Secrets (TELEGRAM_BOT_TOKEN, ANTHROPIC_API_KEY, OPENAI_API_KEY) go via `fly secrets set`.

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false      # keep the long-polling bot alive when there's no web traffic
  auto_start_machines = false
  min_machines_running = 1

  [[http_service.checks]]
    method = "GET"
    path = "/healthz"
    interval = "15s"
    timeout = "5s"
    grace_period = "10s"

[mounts]
  source = "ph_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1024"                 # two Python interpreters; 512MB is the floor, 1GB safe
